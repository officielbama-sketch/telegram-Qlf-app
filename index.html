<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Que la Foudre</title>
<style>
body { font-family: Arial; padding:20px; max-width:500px; margin:auto; background:#fff3e0; }
h2 { text-align:center; color:#333; }
label, select, input, button { width:100%; padding:12px; margin:8px 0; border-radius:6px; border:1px solid #ccc; box-sizing:border-box; }
button { font-weight:bold; background:#ff7043; color:white; transition:0.3s; }
button:hover { background:#e64a19; cursor:pointer; }
.step { display:none; animation:fadeIn 0.3s; }
.active { display:block; }
#error { color:red; font-weight:bold; }
#message { color:green; font-weight:bold; text-align:center; margin-top:10px; }
#recap { background:#fff8dc; padding:10px; border-radius:6px; margin-top:10px; }
ul { padding-left: 20px; }
@keyframes fadeIn { from{opacity:0;} to{opacity:1;} }
</style>
</head>
<body>
<h2>Que la Foudre</h2>

<div id="step1" class="step active">
<label for="category">Catégorie :</label>
<select id="category">
<option value="">--Sélectionner--</option>
<option value="Filtré 🍪">Filtré 🍪</option>
<option value="Premium 🍊">Premium 🍊</option>
<option value="DRY 🇺🇸">DRY 🇺🇸</option>
</select>
<label for="product">Produit :</label>
<select id="product"><option value="">--Sélectionner--</option></select>
<label for="quantity">Quantité (grammes) :</label>
<select id="quantity"><option value="">--Sélectionner--</option></select>
<button id="addBtn">Ajouter au panier</button>
<button id="nextBtn">Suivant</button>
</div>

<div id="step2" class="step">
<label for="delivery">Mode de réception :</label>
<select id="delivery">
<option value="">--Sélectionner--</option>
<option value="Livraison">Livraison (14h-23h, min 40€, +10€ frais)</option>
<option value="Retrait">Retrait sur place (Vaulx-en-Velin, 24h/24, gratuit)</option>
</select>
<button id="prevBtn2">Précédent</button>
<button id="nextBtn2">Suivant</button>
</div>

<div id="step3" class="step">
<label for="name">Nom :</label>
<input type="text" id="name" placeholder="Ton nom">
<label for="phone">Téléphone :</label>
<input type="text" id="phone" placeholder="Ex : 06XXXXXXXX">
<label id="addressLabel" style="display:none;">Adresse (livraison) :</label>
<input type="text" id="address" style="display:none;" placeholder="Adresse complète">
<div id="recap"><strong>Panier :</strong><ul id="cartList"></ul><strong id="totalPrice"></strong></div>
<button id="prevBtn3">Précédent</button>
<button id="submitBtn">Confirmer la commande</button>
</div>

<div id="error"></div>
<div id="message"></div>

<script>
const tg = window.Telegram.WebApp;
tg.expand();

// Produits
const products = {
"Filtré 🍪": [{ name: "Frozen shift [Dark Farm]", weight: 1.5, price: 20 }],
"Premium 🍊": [
{ name: "Cali plate", weight: 1.3, price: 30, disabled: true },
{ name: "Piatella", weight: 1.3, price: 30 }
],
"DRY 🇺🇸": [
{ name: "Cali Mousse", weight: 2, price: 10 },
{ name: "Cali Mousse", weight: 10, price: 50 }
]
};

let cart = [];

// Éléments
const categorySelect=document.getElementById('category');
const productSelect=document.getElementById('product');
const quantitySelect=document.getElementById('quantity');
const addBtn=document.getElementById('addBtn');
const nextBtn=document.getElementById('nextBtn');
const step1=document.getElementById('step1');
const step2=document.getElementById('step2');
const step3=document.getElementById('step3');
const deliverySelect=document.getElementById('delivery');
const prevBtn2=document.getElementById('prevBtn2');
const nextBtn2=document.getElementById('nextBtn2');
const nameInput=document.getElementById('name');
const phoneInput=document.getElementById('phone');
const addressInput=document.getElementById('address');
const addressLabel=document.getElementById('addressLabel');
const cartList=document.getElementById('cartList');
const totalPrice=document.getElementById('totalPrice');
const submitBtn=document.getElementById('submitBtn');
const errorDiv=document.getElementById('error');
const messageDiv=document.getElementById('message');

// Changement catégorie
categorySelect.addEventListener('change', ()=>{
productSelect.innerHTML='<option value="">--Sélectionner--</option>';
quantitySelect.innerHTML='<option value="">--Sélectionner--</option>';
const list=products[categorySelect.value]||[];
list.forEach((p,i)=>{
productSelect.innerHTML+=`<option value="${i}" ${p.disabled?"disabled":""}>${p.name}${p.disabled?" (rupture de stock)":""}</option>`;
quantitySelect.innerHTML+=`<option value="${i}">${p.weight} gr -> ${p.price}€</option>`;
});
});

// Ajouter au panier
addBtn.addEventListener('click', ()=>{
const cat=categorySelect.value;
const pIndex=productSelect.value;
if(!cat||pIndex===""){ errorDiv.textContent="Veuillez choisir un produit."; return; }
const prod=products[cat][pIndex];
if(prod.disabled){ errorDiv.textContent="Produit indisponible."; return; }
cart.push({...prod, category:cat});
updateCart();
errorDiv.textContent="";
});

// Mettre à jour panier
function updateCart(){
cartList.innerHTML="";
let total=0;
cart.forEach(c=>{cartList.innerHTML+=`<li>${c.category} - ${c.name} ${c.weight}gr : ${c.price}€</li>`; total+=c.price;});
totalPrice.textContent="Total : "+total+" €";
}

// Navigation étapes
nextBtn.addEventListener('click', ()=>{
if(cart.length===0){ errorDiv.textContent="Ajoutez au moins un produit."; return; }
step1.classList.remove('active'); step2.classList.add('active');
});

prevBtn2.addEventListener('click', ()=>{
step2.classList.remove('active'); step1.classList.add('active'); errorDiv.textContent=""; messageDiv.textContent="";
});

nextBtn2.addEventListener('click', ()=>{
if(!deliverySelect.value){ errorDiv.textContent="Choisissez un mode de réception."; return; }
if(deliverySelect.value==="Livraison"){ addressInput.style.display="block"; addressLabel.style.display="block"; }
else{ addressInput.style.display="none"; addressLabel.style.display="none"; }
step2.classList.remove('active'); step3.classList.add('active');
});

// Soumission
submitBtn.addEventListener('click', ()=>{
const name=nameInput.value.trim();
const phone=phoneInput.value.trim();
const delivery=deliverySelect.value;
const address=addressInput.value.trim();
if(!name||!phone){ errorDiv.textContent="Veuillez remplir nom et téléphone."; return; }
if(delivery==="Livraison"&&!address){ errorDiv.textContent="Veuillez saisir l'adresse."; return; }
let total=cart.reduce((sum,c)=>sum+c.price,0);
if(delivery==="Livraison" && total<40) total+=10;
const data={cart,name,phone,delivery,total};
if(delivery==="Livraison") data.address=address;
try{ tg.sendData(JSON.stringify(data)); messageDiv.textContent="✅ Commande envoyée !"; } 
catch(err){ console.error(err); errorDiv.textContent="❌ Erreur lors de l'envoi"; }
});
</script>
</body>
</html>
